name: Daily Visa Check

on:
  schedule:
    - cron: "0 0 * * *"
  workflow_dispatch:

jobs:
  run:
    runs-on: ubuntu-latest

    steps:
      - name: Setup Fly CLI
        uses: superfly/flyctl-actions/setup-flyctl@master

      - name: Run daily check on Fly
        run: flyctl machine run --app immiaubot --command "node /app/dist/index.js daily-check"
        env:
          FLY_API_TOKEN: ${{ secrets.FLY_API_TOKEN }}
